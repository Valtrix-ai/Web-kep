<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valtrix Hub | Super Final</title>
    <style>
        :root {
            --bg: #050507;
            --card: #101014;
            --primary: #ff0055;
            --secondary: #8a2be2;
            --glow: rgba(255, 0, 85, 0.5);
            --txt: #ffffff;
            --txt-dim: #888890;
            --grad: linear-gradient(135deg, #ff0055, #8a2be2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--txt); 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 90px;
        }

        .header-glow {
            position: fixed; top: -100px; width: 100%; height: 300px;
            background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, transparent 70%);
            z-index: -1;
        }

        .container { width: 100%; max-width: 500px; padding: 40px 20px; text-align: center; }

        .brand { 
            font-size: 2.5rem; font-weight: 900; background: var(--grad);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--glow)); margin-bottom: 10px;
        }

        .desc { color: var(--txt-dim); font-size: 0.9rem; margin-bottom: 35px; letter-spacing: 0.5px; }

        /* Symmetrical UI Elements */
        .input-group { width: 100%; margin-bottom: 20px; position: relative; }
        input { 
            width: 100%; padding: 18px 20px; background: var(--card); 
            border: 1px solid #222; border-radius: 16px; color: #fff;
            font-size: 1rem; transition: 0.3s; text-align: center;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px var(--glow); }

        .btn-main { 
            width: 100%; padding: 18px; background: var(--grad); border: none;
            border-radius: 16px; color: #fff; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:active { transform: scale(0.98); }

        #msg { margin-top: 15px; font-size: 0.85rem; font-weight: 600; min-height: 20px; }

        /* Result Section */
        .res-box { 
            display: none; background: var(--card); border: 1px solid #222;
            border-radius: 20px; padding: 20px; margin-top: 30px; width: 100%;
            animation: slideUp 0.4s ease;
        }
        .res-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; color: #eee; }
        
        .dl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-dl { 
            padding: 14px; background: #181820; border: 1px solid #333;
            border-radius: 12px; color: #fff; text-decoration: none;
            font-size: 0.8rem; font-weight: 700; transition: 0.2s;
        }
        .btn-dl:hover { border-color: var(--primary); background: #20202a; }

        /* AI Section */
        .ai-card { width: 100%; margin-top: 20px; }
        #ai-img { width: 100%; border-radius: 15px; margin-top: 20px; display: none; border: 2px solid #222; }

        /* Navigation Bar */
        .nav {
            position: fixed; bottom: 20px; width: 90%; max-width: 400px;
            background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(15px);
            border: 1px solid #333; border-radius: 25px; display: flex;
            padding: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .nav-btn {
            flex: 1; padding: 12px; text-align: center; font-size: 0.85rem;
            font-weight: 700; color: var(--txt-dim); cursor: pointer; border-radius: 20px;
        }
        .nav-btn.active { background: var(--grad); color: #fff; }

        .tab { display: none; width: 100%; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-glow"></div>

    <div class="container">
        
        <div id="down-tab" class="tab active">
            <div class="brand">Valtrix</div>
            <div class="desc">Premium Video & Music Downloader</div>

            <div class="input-group">
                <input type="text" id="url" placeholder="Tempel Link Media Di Sini...">
                <button class="btn-main" onclick="startExtract()" id="go-btn">UNDUH SEKARANG</button>
            </div>
            <div id="msg"></div>

            <div class="res-box" id="res">
                <div class="res-title" id="rtitle">Judul Video</div>
                <div style="font-size: 0.75rem; color: var(--txt-dim); margin-bottom: 10px; text-align: left;">VIDEO MP4</div>
                <div class="dl-grid" id="v-list"></div>
                <div style="font-size: 0.75rem; color: var(--txt-dim); margin: 15px 0 10px; text-align: left;">AUDIO MP3</div>
                <div class="dl-grid" id="a-list"></div>
            </div>
        </div>

        <div id="ai-tab" class="tab">
            <div class="brand">AI Studio</div>
            <div class="desc">Ubah Imajinasi Menjadi Gambar Nyata</div>

            <input type="text" id="prompt" placeholder="Contoh: Kucing cyberpunk di Mars...">
            <button class="btn-main" onclick="genAI()" id="ai-btn">BUAT GAMBAR AI</button>
            <div id="ai-msg"></div>
            <img id="ai-img" src="">
        </div>

    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showTab('down', this)">📥 Download</div>
        <div class="nav-btn" onclick="showTab('ai', this)">✨ AI Studio</div>
    </div>

    <script>
        function showTab(t, el) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(t + '-tab').classList.add('active');
            el.classList.add('active');
        }

        async function startExtract() {
            const url = document.getElementById('url').value;
            const msg = document.getElementById('msg');
            const res = document.getElementById('res');
            const btn = document.getElementById('go-btn');

            if(!url) { msg.textContent = "Link wajib diisi!"; return; }

            msg.textContent = "⏳ Mengekstrak data... (Jangan tutup halaman)";
            msg.style.color = "#fff";
            res.style.display = "none";
            btn.disabled = true;

            try {
                const r = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await r.json();

                if(data.success) {
                    msg.textContent = "✅ Berhasil! Klik kualitas di bawah untuk mendownload.";
                    msg.style.color = "#00ffaa";
                    document.getElementById('rtitle').textContent = data.title;
                    
                    const vBox = document.getElementById('v-list');
                    vBox.innerHTML = '';
                    data.videos.forEach(v => {
                        vBox.innerHTML += `<a href="/api/proxy_download?url=${encodeURIComponent(v.url)}&name=${encodeURIComponent(v.name)}" class="btn-dl">${v.label}</a>`;
                    });

                    const aBox = document.getElementById('a-list');
                    aBox.innerHTML = '';
                    data.audios.forEach(a => {
                        aBox.innerHTML += `<a href="/api/proxy_download?url=${encodeURIComponent(a.url)}&name=${encodeURIComponent(a.name)}" class="btn-dl">${a.label}</a>`;
                    });

                    res.style.display = "block";
                } else {
                    msg.textContent = "❌ " + data.message;
                    msg.style.color = var(--primary);
                }
            } catch(e) {
                msg.textContent = "❌ Server error. Coba lagi.";
            } finally {
                btn.disabled = false;
            }
        }

        function genAI() {
            const p = document.getElementById('prompt').value;
            const msg = document.getElementById('ai-msg');
            const img = document.getElementById('ai-img');
            const btn = document.getElementById('ai-btn');

            if(!p) return;
            msg.textContent = "🎨 AI sedang melukis... mohon tunggu.";
            img.style.display = "none";
            btn.disabled = true;

            const seed = Math.floor(Math.random() * 99999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1024&height=1024&seed=${seed}&model=flux`;

            img.onload = () => {
                msg.textContent = "✨ Selesai! Klik/Tahan gambar untuk simpan.";
                img.style.display = "block";
                btn.disabled = false;
            };
            img.src = url;
        }
    </script>
</body>
</html>
