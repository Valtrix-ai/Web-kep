<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub</title>
<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:#fff;}
header {display:flex;justify-content:space-between;align-items:center;padding:15px;background:#1a1a1a;}
header h1 {color:#ff4747;}
nav a {margin:0 10px;color:#fff;text-decoration:none;}
.search {padding:8px;border-radius:5px;border:none;}
.container {padding:20px;}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;}
.card {background:#1c1c1c;border-radius:10px;overflow:hidden;transition:0.3s;}
.card:hover {transform:scale(1.05);}
.card img {width:100%;height:140px;object-fit:cover;}
.card .info {padding:10px;}
.video-player {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;justify-content:center;align-items:center;flex-direction:column;}
video {width:80%;max-height:80%;}
.close {margin-top:10px;padding:10px 20px;background:red;border:none;color:#fff;cursor:pointer;}
</style>
</head>
<body>
<header>
<h1>StreamHub</h1>
<nav>
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Categories</a>
</nav>
<input class="search" placeholder="Search..." oninput="searchVideos(this.value)">
</header>
<div class="container">
<div class="grid" id="videoGrid"></div>
</div><div class="video-player" id="player">
<video controls id="video"></video>
<button class="close" onclick="closePlayer()">Close</button>
</div><script>
const videos = [
{title:"Sample Video 1",thumb:"https://picsum.photos/300/200?1",src:"https://www.w3schools.com/html/mov_bbb.mp4"},
{title:"Sample Video 2",thumb:"https://picsum.photos/300/200?2",src:"https://www.w3schools.com/html/movie.mp4"},
{title:"Sample Video 3",thumb:"https://picsum.photos/300/200?3",src:"https://www.w3schools.com/html/mov_bbb.mp4"},
{title:"Sample Video 4",thumb:"https://picsum.photos/300/200?4",src:"https://www.w3schools.com/html/movie.mp4"}
];

function loadVideos(list) {
const grid = document.getElementById("videoGrid");
grid.innerHTML = "";
list.forEach(v => {
const card = document.createElement("div");
card.className = "card";
card.innerHTML = `
<img src="${v.thumb}">
<div class="info">${v.title}</div>`;
card.onclick = () => playVideo(v.src);
grid.appendChild(card);
});
}

function playVideo(src) {
const player = document.getElementById("player");
const video = document.getElementById("video");
video.src = src;
player.style.display = "flex";
video.play();
}

function closePlayer() {
const player = document.getElementById("player");
const video = document.getElementById("video");
video.pause();
video.src = "";
player.style.display = "none";
}

function searchVideos(query) {
const filtered = videos.filter(v => v.title.toLowerCase().includes(query.toLowerCase()));
loadVideos(filtered);
}

loadVideos(videos);
</script></body>
</html>
