<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valtrix Downloader | Premium Media Saver</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-color: #ff0055;
            --glow-color: rgba(255, 0, 85, 0.5);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --gradient: linear-gradient(135deg, #ff0055, #7000ff);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #2a0050 0%, transparent 50%); z-index: -1; }
        .container { width: 90%; max-width: 800px; text-align: center; padding: 40px 20px; z-index: 1; }
        .logo { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--glow-color)); }
        .subtitle { color: var(--text-dim); margin-bottom: 40px; font-size: 1.1rem; }
        .search-box { display: flex; background: var(--card-bg); padding: 8px; border-radius: 50px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; transition: 0.3s; }
        .search-box:focus-within { border-color: var(--accent-color); box-shadow: 0 0 20px var(--glow-color); }
        .search-box input { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 15px 25px; font-size: 1.1rem; }
        .search-box button { background: var(--gradient); border: none; color: white; padding: 0 35px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        #status-msg { color: var(--accent-color); margin-bottom: 20px; min-height: 20px; font-weight: bold; }
        .result-container { display: none; background: #111; border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 40px; animation: fadeIn 0.5s ease; }
        .media-title { font-size: 1.2rem; margin-bottom: 20px; color: #fff; }
        .download-options { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .format-group { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 100%; max-width: 350px; }
        .format-group h4 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: var(--text-dim); }
        .btn-dl { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; text-decoration: none; font-size: 0.9rem; transition: 0.2s; box-sizing: border-box; }
        .btn-dl:hover { background: #333; border-color: var(--accent-color); }
        .supported-icons { margin-top: 50px; opacity: 0.6; font-size: 0.8rem; letter-spacing: 2px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="logo">Valtrix Downloader</div>
        <div class="subtitle">Unduh Video & Musik dengan kualitas terbaik secara instan.</div>
        <div class="search-box">
            <input type="text" id="url-input" placeholder="Tempel link YouTube, TikTok, Twitter, atau xHamster di sini...">
            <button onclick="prosesLink()" id="btn-proses">UNDUH</button>
        </div>
        <div id="status-msg"></div>
        <div class="result-container" id="result-box">
            <div class="media-title" id="media-title"></div>
            <div class="download-options">
                <div class="format-group">
                    <h4>MP4 (Video)</h4>
                    <div id="video-buttons"></div>
                </div>
                <div class="format-group">
                    <h4>MP3 / M4A (Audio)</h4>
                    <div id="audio-buttons"></div>
                </div>
            </div>
        </div>
        <div class="supported-icons">YOUTUBE • TIKTOK • TWITTER • XHAMSTER • MORE</div>
    </div>
    <script>
        async function prosesLink() {
            const inputUrl = document.getElementById('url-input').value;
            const statusMsg = document.getElementById('status-msg');
            const resultBox = document.getElementById('result-box');
            const btn = document.getElementById('btn-proses');
            if (!inputUrl) { statusMsg.textContent = "Link tidak boleh kosong!"; return; }
            statusMsg.textContent = "Sedang memproses... mohon tunggu.";
            statusMsg.style.color = "#b0b0b0";
            resultBox.style.display = "none";
            btn.disabled = true;
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: inputUrl })
                });
                const result = await response.json();
                if (result.success) {
                    statusMsg.textContent = "Berhasil ditemukan!";
                    statusMsg.style.color = "#00ff88";
                    document.getElementById('media-title').textContent = result.title;
                    const vidBox = document.getElementById('video-buttons');
                    vidBox.innerHTML = '';
                    result.videos.forEach(v => { vidBox.innerHTML += `<a href="${v.url}" target="_blank" class="btn-dl">${v.label}</a>`; });
                    const audBox = document.getElementById('audio-buttons');
                    audBox.innerHTML = '';
                    result.audios.forEach(a => { audBox.innerHTML += `<a href="${a.url}" target="_blank" class="btn-dl">${a.label}</a>`; });
                    resultBox.style.display = "block";
                } else {
                    statusMsg.textContent = result.message;
                    statusMsg.style.color = "#ff0055";
                }
            } catch (error) {
                statusMsg.textContent = "Terjadi kesalahan server.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
