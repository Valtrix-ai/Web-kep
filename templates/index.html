<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valtrix Hub | AI & Media</title>
    <style>
        :root {
            --bg-color: #070709;
            --card-bg: #121216;
            --accent-color: #ff0055;
            --glow-color: rgba(255, 0, 85, 0.4);
            --text-main: #ffffff;
            --text-dim: #9999a1;
            --gradient: linear-gradient(135deg, #ff0055, #8a2be2);
            --nav-bg: rgba(10, 10, 15, 0.9);
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh;
            padding-bottom: 80px; /* Space for nav bar */
        }

        .bg-glow { 
            position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 100vw; max-width: 800px; max-height: 800px;
            background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, transparent 60%); 
            z-index: -1; 
        }

        .container { 
            width: 100%; max-width: 600px; 
            margin: 0 auto; padding: 40px 20px; 
            text-align: center; 
        }

        .logo { 
            font-size: 2.2rem; font-weight: 900; letter-spacing: 1px;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 15px var(--glow-color));
            margin-bottom: 5px;
        }

        .subtitle { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 40px; }

        /* Super Symmetrical Search Box */
        .search-box { 
            display: flex; flex-direction: column; gap: 15px;
            background: transparent; margin-bottom: 20px;
        }

        .search-box input { 
            width: 100%; padding: 18px 25px; 
            background: var(--card-bg); border: 2px solid #222; 
            border-radius: 15px; color: white; font-size: 1rem;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-box input:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 20px var(--glow-color); }

        .search-box button, .btn-primary { 
            width: 100%; padding: 16px; 
            background: var(--gradient); border: none; border-radius: 15px; 
            color: white; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s;
        }

        .search-box button:hover, .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--glow-color); }

        #status-msg { color: var(--accent-color); font-size: 0.9rem; font-weight: bold; min-height: 20px; margin-bottom: 20px; }

        /* Results Area */
        .result-container { 
            display: none; background: var(--card-bg); 
            border: 1px solid #333; border-radius: 20px; 
            padding: 20px; margin-top: 20px; animation: fadeIn 0.4s ease; 
        }

        .media-title { font-size: 1.1rem; margin-bottom: 20px; color: #fff; word-break: break-word; line-height: 1.4; }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-dl { 
            padding: 12px; background: #1a1a24; border: 1px solid #333; 
            color: white; border-radius: 10px; text-decoration: none; 
            font-size: 0.85rem; font-weight: bold; transition: 0.2s; 
        }
        .btn-dl:hover { border-color: var(--accent-color); background: #222; }
        .section-title { font-size: 0.9rem; color: var(--text-dim); margin: 15px 0 10px; text-align: left; border-bottom: 1px solid #333; padding-bottom: 5px;}

        /* AI Image Generator Section */
        #ai-image-result {
            width: 100%; border-radius: 15px; margin-top: 20px; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-top: 1px solid #333; display: flex; justify-content: space-around;
            padding: 15px 10px; z-index: 100;
        }

        .nav-item {
            color: var(--text-dim); font-size: 0.9rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; padding: 5px 15px; border-radius: 10px;
        }

        .nav-item.active { color: #fff; background: rgba(255, 0, 85, 0.2); border: 1px solid var(--accent-color); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        
        <div id="tab-downloader" class="tab-content active">
            <div class="logo">Valtrix Downloader</div>
            <div class="subtitle">Unduh Video & MP3 Kualitas Premium</div>

            <div class="search-box">
                <input type="text" id="url-input" placeholder="Tempel link YouTube, TikTok, dll...">
                <button onclick="prosesLink()" id="btn-proses">EKSTRAK LINK</button>
            </div>

            <div id="status-msg"></div>

            <div class="result-container" id="result-box">
                <div class="media-title" id="media-title"></div>
                
                <div class="section-title">VIDEO (MP4)</div>
                <div class="grid-options" id="video-buttons"></div>

                <div class="section-title" style="margin-top: 20px;">AUDIO (MP3/M4A)</div>
                <div class="grid-options" id="audio-buttons"></div>
            </div>
        </div>

        <div id="tab-ai" class="tab-content">
            <div class="logo">Valtrix AI Studio</div>
            <div class="subtitle">Buat Gambar Keren Hanya dengan Teks</div>

            <div class="search-box">
                <input type="text" id="ai-prompt" placeholder="Contoh: Mobil sport neon di malam hari...">
                <button class="btn-primary" onclick="generateAIImage()" id="btn-ai">GENERATE GAMBAR</button>
            </div>
            
            <div id="ai-status-msg" style="color: var(--text-dim); font-size: 0.9rem; margin-top: 10px;"></div>
            <img id="ai-image-result" src="" alt="Hasil AI">
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('downloader', this)">📥 Downloader</div>
        <div class="nav-item" onclick="switchTab('ai', this)">✨ AI Studio</div>
    </div>

    <script>
        // Logika Perpindahan Tab Navigasi
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');
        }

        // Logika Downloader
        async function prosesLink() {
            const inputUrl = document.getElementById('url-input').value;
            const statusMsg = document.getElementById('status-msg');
            const resultBox = document.getElementById('result-box');
            const btn = document.getElementById('btn-proses');

            if (!inputUrl) { statusMsg.textContent = "Isi linknya dulu, bos!"; return; }

            statusMsg.textContent = "Menganalisis link... menembus keamanan...";
            statusMsg.style.color = "#fff";
            resultBox.style.display = "none";
            btn.textContent = "MEMPROSES...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: inputUrl })
                });
                const result = await response.json();

                if (result.success) {
                    statusMsg.textContent = "Berhasil! Pilih resolusi di bawah.";
                    statusMsg.style.color = "#00ff88";
                    
                    document.getElementById('media-title').textContent = result.title;
                    
                    // Render Video (Format Grid)
                    const vidBox = document.getElementById('video-buttons');
                    vidBox.innerHTML = '';
                    result.videos.forEach(v => {
                        vidBox.innerHTML += `<a href="${v.url}" target="_blank" class="btn-dl">${v.label}</a>`;
                    });

                    // Render Audio (Format Grid)
                    const audBox = document.getElementById('audio-buttons');
                    audBox.innerHTML = '';
                    result.audios.forEach(a => {
                        audBox.innerHTML += `<a href="${a.url}" target="_blank" class="btn-dl">${a.label}</a>`;
                    });

                    resultBox.style.display = "block";
                } else {
                    statusMsg.textContent = result.message;
                    statusMsg.style.color = "var(--accent-color)";
                }
            } catch (error) {
                statusMsg.textContent = "Server terlalu sibuk, coba beberapa saat lagi.";
                statusMsg.style.color = "var(--accent-color)";
            } finally {
                btn.textContent = "EKSTRAK LINK";
                btn.disabled = false;
            }
        }

        // Logika AI Image Generator (Tanpa API Key!)
        function generateAIImage() {
            const prompt = document.getElementById('ai-prompt').value;
            const statusMsg = document.getElementById('ai-status-msg');
            const imgResult = document.getElementById('ai-image-result');
            const btn = document.getElementById('btn-ai');

            if (!prompt) { statusMsg.textContent = "Ketik sesuatu yang ingin digambar!"; return; }

            statusMsg.textContent = "AI sedang melukis gambar... (Tunggu sekitar 5 detik)";
            imgResult.style.display = "none";
            btn.disabled = true;

            // Menggunakan open API Pollinations (gratis, tanpa key)
            const seed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=768&height=768&seed=${seed}&model=flux`;

            imgResult.onload = function() {
                statusMsg.textContent = "Selesai! Tahan gambarnya untuk mengunduh.";
                imgResult.style.display = "block";
                btn.disabled = false;
            };

            imgResult.onerror = function() {
                statusMsg.textContent = "Gagal memuat gambar, coba kata kunci lain.";
                btn.disabled = false;
            };

            imgResult.src = imageUrl;
        }
    </script>
</body>
</html>
