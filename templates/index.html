<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valtrix Galactic</title>
    <style>
        body {
            margin: 0; background: #020205; color: white; font-family: 'Orbitron', sans-serif;
            overflow-x: hidden; background-image: radial-gradient(circle at 50% 50%, #100b2e 0%, #020205 100%);
        }
        /* Efek Bintang Bergerak */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: url('https://www.transparenttextures.com/patterns/stardust.png'); animation: move 100s linear infinite; }
        @keyframes move { from {background-position: 0 0;} to {background-position: 10000px 5000px;} }

        .nav { display: flex; justify-content: space-between; padding: 20px 40px; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav a { color: #00d4ff; text-decoration: none; font-weight: bold; text-shadow: 0 0 10px #00d4ff; }

        .hero { text-align: center; padding: 100px 20px; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(to right, #00d4ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(0,212,255,0.5)); }
        
        .box { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(0,212,255,0.3); box-shadow: 0 0 40px rgba(0,212,255,0.1); backdrop-filter: blur(15px); }
        input { width: 80%; padding: 15px; border-radius: 50px; border: none; background: rgba(0,0,0,0.5); color: white; border: 1px solid #333; outline: none; margin-bottom: 20px; }
        button { padding: 15px 40px; border-radius: 50px; border: none; background: linear-gradient(45deg, #00d4ff, #ff00ff); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px #00d4ff; }

        .results { margin-top: 30px; display: none; }
        .btn-dl { display: inline-block; padding: 10px 20px; margin: 5px; border: 1px solid #00d4ff; border-radius: 10px; color: white; text-decoration: none; transition: 0.2s; }
        .btn-dl:hover { background: #00d4ff; color: black; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="nav">
        <div class="logo">VALTRIX HUB</div>
        <div>
            <a href="/login">LOGIN</a> | <a href="/register">SIGN UP</a> | <a href="/admin">ADMIN</a>
        </div>
    </div>
    <div class="hero">
        <h1>GALACTIC DOWNLOADER</h1>
        <p style="color: #888;">YouTube • TikTok • Twitter • xHamster</p>
        <div class="box">
            <input type="text" id="url" placeholder="Tempel link luar angkasa Anda di sini...">
            <br>
            <button onclick="unduh()">UNDUH SEKARANG</button>
            <div id="status" style="margin-top: 15px; color: #00d4ff;"></div>
            <div class="results" id="res">
                <h4 id="title"></h4>
                <div id="v"></div>
                <hr style="border: 0.1px solid #333">
                <div id="a"></div>
            </div>
        </div>
    </div>

    <script>
        async function unduh() {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            const res = document.getElementById('res');
            if(!url) return alert("Isi linknya dulu!");
            
            status.innerText = "⏳ Meluncur ke Server...";
            res.style.display = "none";

            try {
                const r = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const d = await r.json();
                if(d.success) {
                    status.innerText = "✅ Berhasil!";
                    document.getElementById('title').innerText = d.title;
                    document.getElementById('v').innerHTML = d.v.map(i => `<a href="/proxy?url=${encodeURIComponent(i.u)}" class="btn-dl">${i.l} MP4</a>`).join('');
                    document.getElementById('a').innerHTML = d.a.map(i => `<a href="/proxy?url=${encodeURIComponent(i.u)}" class="btn-dl">${i.l} MP3</a>`).join('');
                    res.style.display = "block";
                } else { status.innerText = "❌ Gagal!"; }
            } catch { status.innerText = "❌ Error!"; }
        }
    </script>
</body>
</html>
